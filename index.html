<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Mistrza Gry</title>
    <link rel="stylesheet" href="styles/style_base.css">
    <link rel="stylesheet" href="styles/style_gm.css">

    <script src="scripts/gm_start.js"></script>
    <script src="scripts/gm_menu.js"></script>

    <script src="scripts/creating_character_sheet.js"></script>
    <script src="scripts/damage_and_armor.js"></script>
    <script src="scripts/abilities_and_equipment.js"></script>
    <script src="scripts/misc_character_functions.js"></script>
    <script src="scripts/internationalization.js"></script>
    <script src="scripts/network.js"></script>

    <script src="data/spells.js"></script>
    <script id="players-data" src="data/players.js"></script>
    <script src="data/adventurers.js"></script>
    <script src="data/monsters.js"></script>
    <script src="data/bosses.js"></script>
</head>
<body>
    <div id="GM-menu-bar" class="navbar">
        <div class="navbarButtons">
            <button onclick="setTurnOrder()">Pokaż kolejność ruchów (K)</button>
            <button onclick="newRound()">Nowa tura (N)</button>
            <button onclick="endCombat()">Zakończ walkę (Z)</button>
            <button onclick="showMusicMenu()">Lista utworów (M)</button>
            <button onclick="toggleMusic()">Zatrzymaj / Wznów utwór (S)</button>
            <button onclick="toggleSidebar()">Wysuń / Schowaj boczne menu (L)</button>
            <button id="gm-mute-btn" onclick="toggleGlobalMute()">🔊</button>
            <button id="gm-lang-btn" onclick="toggleLanguage()"></button>
        </div>
    </div>
    <div id="Sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <span class="sidebar-title"></span>
            <button id="toggleLockSidebar" onclick="toggleLockSidebar()">🔓</button>
        </div>
        <div class="sidebar-content"></div>
        <div class="sidebar-conditions">
            <h3>Stany</h3>
        </div>
    </div>
    <div class="button-group enemies-group">
        <h2>Przeciwnicy</h2>
        <select id="monsterSelectorEnemy" class="button-like-select">
            <option value="" selected disabled hidden>+ Dodaj konkretnego potwora</option>
        </select>
        <select id="adventurerSelectorEnemy" class="button-like-select">
            <option value="" selected disabled hidden>+ Dodaj konkretnego poszukiwacza</option>
        </select>
        <select id="bossSelector" class="button-like-select">
            <option value="" selected disabled hidden>+ Dodaj bossa</option>
        </select>
        <div class="add-button" onclick="addCharacter('monster', 'enemy')">+ Dodaj potwora</div>
        <div class="add-button" onclick="addCharacter('adventurer', 'enemy')">+ Dodaj poszukiwacza</div>
    </div>
    <div id="enemyTeam" class="team"></div>
    <div class="button-group">
        <h2>Bohaterowie</h2>
        <select id="monsterSelectorHero" class="button-like-select">
            <option value="" selected disabled hidden>+ Dodaj konkretnego potwora</option>
        </select>
        <select id="adventurerSelectorHero" class="button-like-select">
            <option value="" selected disabled hidden>+ Dodaj konkretnego poszukiwacza</option>
        </select>
        <div class="add-button" onclick="addCharacter('monster', 'hero')">+ Dodaj potwora</div>
        <div class="add-button" onclick="addCharacter('adventurer', 'hero')">+ Dodaj poszukiwacza</div>
    </div>
    <div id="heroTeam" class="team"></div>
</body>
</html>
