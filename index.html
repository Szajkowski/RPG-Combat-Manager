<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Widok Mistrza Gry</title>
    <link rel="stylesheet" href="styles/style_gm.css">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <script id="abilities-data" src="data/abilities.js"></script>
    <script id="players-data" src="data/players.js"></script>
    <script id="mobs-data" src="data/mobs.js"></script>
    <script id="npcs-data" src="data/npcs.js"></script>
    <script id="bosses-data" src="data/bosses.js"></script>
    
    <script src="scripts/i18n.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/audio.js"></script>
    <script src="scripts/network.js"></script>
    
    <script src="scripts/arena.js"></script>
    <script src="scripts/character_main_panel.js"></script>
    <script src="scripts/character_extra_panel.js"></script>
    <script src="scripts/conditions.js"></script>
    <script src="scripts/damage_heal_armor.js"></script>
    <script src="scripts/functional_column.js"></script>
    <script src="scripts/initiative_tracker.js"></script>
    
    <script src="scripts/gm_start.js"></script>
</head>
<body>

    <div class="top-bar">
        <div class="initiative-tracker"></div>
        <div class="top-controls-wrapper">
            <div class="top-controls">
                <button class="icon-btn" onclick="nextTurn()" data-i18n-title="btn_next_turn">››</button>
                <button class="icon-btn" onclick="newRound()" data-i18n-title="btn_next_round">›››</button>
                <button class="icon-btn accent-btn" onclick="endCombat()" data-i18n="btn_end_combat" data-i18n-title="btn_end_combat"></button>

                <div class="top-bar-divider"></div>
                
                <button id="mute-btn" class="circle-btn" data-i18n-title="title_mute_ui" onclick="toggleGlobalMute()">🔊</button>
                <button id="lang-btn" class="circle-btn" data-i18n-title="title_change_language" onclick="toggleLanguage()">🇵🇱</button>
            </div>
        </div>
    </div>

    <div class="main-workspace">
        
        <div class="left-panel">
            <div class="panel-header" data-i18n="gm_dice"></div>
            <div class="gm-dice-widget">
                <div class="dice-input-box">
                    <span class="dice-prefix" data-i18n="dice_short"></span>
                    <input type="number" id="gm-dice-input" value="20" min="2" max="1000" data-i18n-title="title_dice_size">
                    <button class="dice-roll-btn" onclick="rollGmDice()" data-i18n="roll"></button>
                </div>
                <div class="dice-result-shield">
                    <span id="gm-dice-result">-</span>
                </div>
            </div>

            <div class="panel-header">
                <span data-i18n="active_conditions"></span>
            </div>
            <div class="conditions-list" id="conditions-list-container">
            </div>
            
            <div class="music-section">
                <div class="panel-header">
                    <span data-i18n="music_list"></span>
                    <span class="header-hint" data-i18n="hover_to_expand"></span>
                </div>
                <div class="music-list">
                </div>
            </div>
        </div>

        <div class="arena">
            <div class="arena-add-bar hero-bar">
                <select id="hero-mob-select"><option disabled selected hidden data-i18n="add_mob"></option></select>
                <select id="hero-npc-select"><option disabled selected hidden data-i18n="add_npc"></option></select>
                <select id="hero-boss-select"><option disabled selected hidden data-i18n="add_boss"></option></select>
                <select id="hero-player-select"><option disabled selected hidden data-i18n="add_player"></option></select>
                <button onclick="addCharacter('character', 'hero')" data-i18n="add_character"></button>
            </div>

            <div class="arena-board">
                <div id="heroTeam" class="arena-team">
                    </div>

                <div class="arena-divider">VS</div>

                <div id="enemyTeam" class="arena-team">
                    </div>
            </div>

            <div class="arena-add-bar enemy-bar">
                <select id="enemy-mob-select"><option disabled selected hidden data-i18n="add_mob"></option></select>
                <select id="enemy-npc-select"><option disabled selected hidden data-i18n="add_npc"></option></select>
                <select id="enemy-boss-select"><option disabled selected hidden data-i18n="add_boss"></option></select>
                <select id="enemy-player-select"><option disabled selected hidden data-i18n="add_player"></option></select>
                <button onclick="addCharacter('character', 'enemy')" data-i18n="add_character"></button>
            </div>
        </div>

        <div class="right-panel" id="characterDetailsPanel">
            <div class="char-sheet" id="panel-char-sheet"></div>
            <div class="char-functional-col" id="panel-char-functional"></div>
            <div class="char-extra-panel" id="panel-extra"></div>
        </div>

    </div>

</body>
</html>
